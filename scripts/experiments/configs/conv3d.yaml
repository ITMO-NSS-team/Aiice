output_path: ./outputs

aiice:
  sea: ["Kara Sea", "Barents Sea", "Chukchi Sea", "Sea of Japan", "Laptev Sea"]
  start_date: "1980-01-01"
  end_date: "2020-01-01"
  pre_history_len: 104
  forecast_len: 52
  step: 7
  batch_size: 128

run:
  model_name: conv3d

  experiments:
    - kernel_size: [3, 3, 3]
      lr: 0.0001
      max_epoch: 350
      patience: 30
      min_delta: 0.001

    - kernel_size: [5, 5, 5]
      lr: 0.0001
      max_epoch: 350
      patience: 30
      min_delta: 0.001

    - kernel_size: [7, 7, 7]
      lr: 0.0001
      max_epoch: 350
      patience: 30
      min_delta: 0.001
